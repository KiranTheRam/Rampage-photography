services:
  web:
    image: registry.example.com/rampage-photography:latest
    restart: unless-stopped
    env_file:
      - ./.env.production
    ports:
      - "3000:3000"
    volumes:
      - ./photos:/app/public/photos
      - ./data:/app/data
    tmpfs:
      - /app/.next/cache:size=256m,mode=1777

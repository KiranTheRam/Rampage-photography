services:
  web:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "4375:3000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in your shell or .env file}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?set ADMIN_SESSION_SECRET in your shell or .env file}
    volumes:
      - ./public/photos:/app/public/photos
      - ./data:/app/data
